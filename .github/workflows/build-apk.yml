name: Build APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '**.pdf'
      - 'CLAUDE.md'
      - 'BUGS.md'
      - 'GITHUB_*'
      - 'WORKLOG_*'
      - '.gitignore'
      - 'workspace.json'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '**.pdf'
      - 'CLAUDE.md'
      - 'BUGS.md'
      - 'GITHUB_*'
      - 'WORKLOG_*'
      - '.gitignore'
      - 'workspace.json'
  workflow_dispatch:

# Cancel in-progress runs for the same ref when a new commit is pushed.
# Saves CI minutes when force-pushing or rapid-firing commits to a PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Create debug keystore
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Debug,O=Debug,C=US"
          fi

      - name: Build Debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug --stacktrace

      # Release build is gated behind workflow_dispatch — Proguard
      # makes assembleRelease slow, and on PR/push CI we only need
      # the debug APK. Trigger manually from the Actions tab when you
      # actually want a release artifact.
      - name: Build Release APK
        if: github.event_name == 'workflow_dispatch'
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GlassFiles-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: GlassFiles-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
